name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check HTML file exists
        run: test -f index.html

      - name: Basic HTML sanity check
        run: grep -q "<html" index.html

      - name: Scan for secrets (basic)
        run: |
          echo "Checking for exposed secrets..."
          ! grep -r "password" . || exit 1
          ! grep -r "secret" . || exit 1